name: Deploy to EC2
# Use reusable workflow to deploy to EC2 instance.This workflow is triggered on push to main branch.
on:
  push:
    branches: [main]

jobs:
  deploy:
    uses: simpledotorg/poc_heart360_on_grafana/.github/workflows/deploy-ec2-reusable.yml@main
    with:
      ec2_deploy_path: /home/ec2-user/h360tk_philippines
    secrets:
      EC2_HOST: ${{ secrets.EC2_HOST }}
      EC2_USER: ${{ secrets.EC2_USER }}
      EC2_SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_PRIVATE_KEY }}